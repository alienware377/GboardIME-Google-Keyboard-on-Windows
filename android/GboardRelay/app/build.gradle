plugins {
    id 'com.android.application'
}

android {
    namespace 'com.gboardrelay'
    compileSdk 34

    defaultConfig {
        applicationId "com.gboardrelay"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external deps needed
}
